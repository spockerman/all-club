# Config-as-code do serviço WEB no Railway.
# No serviço da web, defina "Config-as-code path" = apps/web/railway.toml
# (a API continua usando o railway.toml da raiz).
#
# Variável obrigatória no serviço (Settings > Variables):
#   NEXT_PUBLIC_API_URL = https://<sua-api>.up.railway.app
# Ela é injetada como build arg e embutida no bundle do client em build-time.

[build]
builder = "DOCKERFILE"
dockerfilePath = "apps/web/Dockerfile"

[deploy]
healthcheckPath = "/login"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
