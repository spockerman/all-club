services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: allclub
      POSTGRES_PASSWORD: allclub_secret
      POSTGRES_DB: allclub
    ports:
      # host:container — Postgres escuta na 5432 dentro do container
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U allclub -d allclub -p 5432"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    ports:
      - "3001:3001"
    environment:
      DATABASE_URL: "postgresql://allclub:allclub_secret@postgres:5432/allclub"
      JWT_SECRET: "troque-por-secret-seguro-em-producao"
      PORT: "3001"
      NODE_ENV: production
    depends_on:
      postgres:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: "http://localhost:3001"
      NODE_ENV: production
    depends_on:
      - api

volumes:
  postgres_data:
